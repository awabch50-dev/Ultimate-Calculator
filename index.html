<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovCalc — Advanced Calculator</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="assets/icons/logo-512.png" />
  <link rel="apple-touch-icon" href="assets/icons/logo-512.png" />
  <meta name="theme-color" content="#7c6bff" />
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="header-top">
        <div class="logo">
          <img src="assets/icons/logo-192.png" alt="NovCalc Logo" class="logo-icon" />
          <span class="logo-text">NovCalc</span>
        </div>
        <div class="header-controls">
          <button class="theme-btn" id="theme-toggle" title="Toggle Theme">☀️</button>
          <button class="lang-btn" id="lang-toggle" title="Switch Language">اردو</button>
        </div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="standard" data-i18n="tab.standard">Standard</button>
        <button class="mode-tab" data-mode="scientific" data-i18n="tab.scientific">Scientific</button>
        <button class="mode-tab" data-mode="currency" data-i18n="tab.currency">Currency</button>
        <button class="mode-tab" data-mode="unit" data-i18n="tab.unit">Unit</button>
      </div>
    </header>

    <!-- STANDARD CALCULATOR -->
    <div class="calc-panel active" id="standard">
      <div class="display-wrap">
        <div class="expression" id="std-expr"></div>
        <div class="result" id="std-result">0</div>
        <div class="result-hint" id="std-hint"></div>
      </div>
      <div class="history-strip" id="std-history"></div>
      <div class="keypad">
        <!-- Row 1 -->
        <button class="key key-fn" data-action="clear">AC</button>
        <button class="key key-fn" data-action="sign">±</button>
        <button class="key key-fn" data-action="percent">%</button>
        <button class="key key-op" data-op="÷">÷</button>
        <!-- Row 2 -->
        <button class="key key-num" data-num="7">7</button>
        <button class="key key-num" data-num="8">8</button>
        <button class="key key-num" data-num="9">9</button>
        <button class="key key-op" data-op="×">×</button>
        <!-- Row 3 -->
        <button class="key key-num" data-num="4">4</button>
        <button class="key key-num" data-num="5">5</button>
        <button class="key key-num" data-num="6">6</button>
        <button class="key key-op" data-op="−">−</button>
        <!-- Row 4 -->
        <button class="key key-num" data-num="1">1</button>
        <button class="key key-num" data-num="2">2</button>
        <button class="key key-num" data-num="3">3</button>
        <button class="key key-op" data-op="+">+</button>
        <!-- Row 5 -->
        <button class="key key-num key-zero" data-num="0">0</button>
        <button class="key key-num" data-action="decimal">.</button>
        <button class="key key-eq" data-action="equals">=</button>
      </div>
    </div>

    <!-- SCIENTIFIC CALCULATOR -->
    <div class="calc-panel" id="scientific">
      <div class="display-wrap">
        <div class="expression" id="sci-expr"></div>
        <div class="result" id="sci-result">0</div>
        <div class="result-hint" id="sci-hint"></div>
      </div>
      <div class="history-strip" id="sci-history"></div>
      <div class="keypad keypad-sci">
        <!-- Row 1: Function keys -->
        <button class="key key-sci" data-sci="sin">sin</button>
        <button class="key key-sci" data-sci="cos">cos</button>
        <button class="key key-sci" data-sci="tan">tan</button>
        <button class="key key-sci" data-sci="log">log</button>
        <button class="key key-sci" data-sci="ln">ln</button>
        <!-- Row 2 -->
        <button class="key key-sci" data-sci="sqrt">√</button>
        <button class="key key-sci" data-sci="sq">x²</button>
        <button class="key key-sci" data-sci="pow">xʸ</button>
        <button class="key key-sci" data-sci="pi">π</button>
        <button class="key key-sci" data-sci="e">e</button>
        <!-- Row 3 -->
        <button class="key key-sci" data-sci="abs">|x|</button>
        <button class="key key-sci" data-sci="inv">1/x</button>
        <button class="key key-sci" data-sci="fact">n!</button>
        <button class="key key-fn" data-action="clear">AC</button>
        <button class="key key-fn" data-action="backspace">⌫</button>
        <!-- Row 4 -->
        <button class="key key-num" data-num="7">7</button>
        <button class="key key-num" data-num="8">8</button>
        <button class="key key-num" data-num="9">9</button>
        <button class="key key-op" data-op="÷">÷</button>
        <button class="key key-op" data-op="×">×</button>
        <!-- Row 5 -->
        <button class="key key-num" data-num="4">4</button>
        <button class="key key-num" data-num="5">5</button>
        <button class="key key-num" data-num="6">6</button>
        <button class="key key-op" data-op="+">+</button>
        <button class="key key-op" data-op="−">−</button>
        <!-- Row 6 -->
        <button class="key key-num" data-num="1">1</button>
        <button class="key key-num" data-num="2">2</button>
        <button class="key key-num" data-num="3">3</button>
        <button class="key key-num" data-num="0">0</button>
        <button class="key key-eq" data-action="equals">=</button>
      </div>
    </div>

    <!-- CURRENCY CONVERTER -->
    <div class="calc-panel" id="currency">
      <div class="currency-header">
        <h2 data-i18n="currency.title">Currency Converter</h2>
        <button class="refresh-btn" id="refresh-rates" title="Refresh rates" data-i18n="currency.refresh">↻ Refresh</button>
      </div>
      <div class="rate-status" id="rate-status" data-i18n="currency.status">Using built-in reference rates</div>

      <div class="currency-box">
        <div class="currency-row">
          <div class="currency-select-wrap">
            <span class="flag" id="flag-from">🇺🇸</span>
            <div class="cur-dropdown" id="dd-from">
              <button class="cur-dd-btn" type="button" id="dd-from-btn">
                <span id="dd-from-label">USD — US Dollar</span>
                <span class="cur-dd-chevron">▾</span>
              </button>
              <div class="cur-dd-panel" id="dd-from-panel"></div>
            </div>
          </div>
          <input type="number" id="amount-from" class="currency-input" placeholder="0.00" value="1"/>
        </div>

        <button class="swap-btn" id="swap-currency" data-i18n="currency.swap">⇅ Swap</button>

        <div class="currency-row">
          <div class="currency-select-wrap">
            <span class="flag" id="flag-to">🇵🇰</span>
            <div class="cur-dropdown" id="dd-to">
              <button class="cur-dd-btn" type="button" id="dd-to-btn">
                <span id="dd-to-label">PKR — Pakistani Rupee</span>
                <span class="cur-dd-chevron">▾</span>
              </button>
              <div class="cur-dd-panel" id="dd-to-panel"></div>
            </div>
          </div>
          <input type="number" id="amount-to" class="currency-input" placeholder="0.00" readonly/>
        </div>
      </div>

      <div class="rate-info" id="rate-info">
        <span id="rate-text">1 USD = 278.50 PKR</span>
      </div>

      <div class="popular-pairs">
        <button class="pairs-toggle-btn" id="pairs-toggle" data-i18n="currency.showPairs">Show Suggested Pairs</button>
        <div class="pairs-collapsible" id="pairs-collapsible">
          <p class="pair-label" data-i18n="currency.popularPairs">Popular Pairs</p>
          <div class="pair-grid" id="pair-grid"></div>
        </div>
      </div>
    </div>

    <!-- UNIT CONVERTER -->
    <div class="calc-panel" id="unit">
      <div class="unit-header">
        <h2 data-i18n="unit.title">Unit Converter</h2>
      </div>
      <div class="unit-category-wrap">
        <button class="unit-cat active" data-cat="length" data-i18n="unit.length">📏 Length</button>
        <button class="unit-cat" data-cat="weight" data-i18n="unit.weight">⚖️ Weight</button>
        <button class="unit-cat" data-cat="temp" data-i18n="unit.temp">🌡️ Temp</button>
        <button class="unit-cat" data-cat="area" data-i18n="unit.area">🟦 Area</button>
        <button class="unit-cat" data-cat="speed" data-i18n="unit.speed">🚀 Speed</button>
        <button class="unit-cat" data-cat="data" data-i18n="unit.data">💾 Data</button>
      </div>
      <div class="unit-converter-box">
        <div class="unit-row">
          <div class="cur-dropdown" id="udd-from">
            <button class="cur-dd-btn" type="button" id="udd-from-btn">
              <span id="udd-from-label">Meter</span>
              <span class="cur-dd-chevron">▾</span>
            </button>
            <div class="cur-dd-panel" id="udd-from-panel"></div>
          </div>
          <input type="number" id="unit-input-from" class="unit-input" placeholder="0" value="1"/>
        </div>
        <button class="swap-btn" id="swap-units" data-i18n="unit.swap">⇅ Swap</button>
        <div class="unit-row">
          <div class="cur-dropdown" id="udd-to">
            <button class="cur-dd-btn" type="button" id="udd-to-btn">
              <span id="udd-to-label">Kilometer</span>
              <span class="cur-dd-chevron">▾</span>
            </button>
            <div class="cur-dd-panel" id="udd-to-panel"></div>
          </div>
          <input type="number" id="unit-input-to" class="unit-input" placeholder="0" readonly/>
        </div>
      </div>
      <div class="unit-formula" id="unit-formula"></div>
    </div>

  </div><!-- end app-wrapper -->

  <script src="script.js"></script>
</body>
</html>
